<div class="countdown-widget" id="countdown-widget">
  <p class="countdown-widget__label">⏰ Offer expires in:</p>
  <div class="countdown-widget__timer">
    <div class="countdown-unit">
      <span class="countdown-unit__value" id="cdw-hours">00</span>
      <span class="countdown-unit__label">Hours</span>
    </div>
    <span class="countdown-widget__sep">:</span>
    <div class="countdown-unit">
      <span class="countdown-unit__value" id="cdw-minutes">00</span>
      <span class="countdown-unit__label">Minutes</span>
    </div>
    <span class="countdown-widget__sep">:</span>
    <div class="countdown-unit">
      <span class="countdown-unit__value" id="cdw-seconds">00</span>
      <span class="countdown-unit__label">Seconds</span>
    </div>
  </div>
</div>
